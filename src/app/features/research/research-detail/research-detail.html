<div class="page-container">
  <a mat-button [routerLink]="['/labs', labId]" class="back-link">
    <mat-icon>arrow_back</mat-icon>
    Back to Lab
  </a>

  @if (loading()) {
    <div class="spinner-center">
      <mat-progress-spinner mode="indeterminate" />
    </div>
  } @else if (research()) {
    <h1>{{ research()!.name }}</h1>
    <p class="description">{{ research()!.description || 'No description.' }}</p>

    <h2>Members</h2>

    <div class="add-member-row">
      <mat-form-field appearance="outline">
        <mat-label>Member ID</mat-label>
        <input matInput type="number" [(ngModel)]="addMemberId" placeholder="Enter member ID" />
      </mat-form-field>
      <button mat-raised-button color="primary" (click)="addMember()" [disabled]="!addMemberId()">
        <mat-icon>person_add</mat-icon>
        Add
      </button>
    </div>

    <table mat-table [dataSource]="research()!.members ?? []" class="full-width">
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Name</th>
        <td mat-cell *matCellDef="let m">{{ m.first_name }} {{ m.last_name }}</td>
      </ng-container>

      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef>Email</th>
        <td mat-cell *matCellDef="let m">{{ m.email }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let m">
          <button mat-icon-button color="warn" matTooltip="Remove" (click)="removeMember(m)">
            <mat-icon>person_remove</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="memberColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: memberColumns"></tr>
      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell empty-cell" [attr.colspan]="3">No members assigned.</td>
      </tr>
    </table>
  }
</div>
