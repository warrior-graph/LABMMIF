<div class="page-container">
  <div class="page-header">
    <h1>Laboratories</h1>
    @if (authService.currentUser()?.is_super_admin) {
      <button mat-raised-button color="primary" (click)="openCreate()">
        <mat-icon>add</mat-icon>
        New Laboratory
      </button>
    }
  </div>

  @if (loading()) {
    <div class="spinner-center">
      <mat-progress-spinner mode="indeterminate" />
    </div>
  } @else if (labs().length === 0) {
    <p class="empty-state">No laboratories found.</p>
  } @else {
    <div class="lab-grid">
      @for (lab of labs(); track lab.id) {
        <mat-card class="lab-card" [routerLink]="['/labs', lab.id]">
          <mat-card-header>
            <mat-card-title>{{ lab.name }}</mat-card-title>
          </mat-card-header>
          <mat-card-content>
            <p>{{ lab.description || 'No description provided.' }}</p>
          </mat-card-content>
          <mat-card-actions>
            <button mat-button color="primary">Open</button>
          </mat-card-actions>
        </mat-card>
      }
    </div>
  }
</div>
